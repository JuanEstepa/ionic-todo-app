<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar> </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-header">
    <h1 class="page-title">Categories</h1>
    <p class="page-sub">Organiza tu tareas en categorias</p>
  </div>

  <div class="content-pad">
    <button class="create-btn" (click)="openAddCategoryModal()">
      <ion-icon name="add-outline" class="create-icon" />
      Nueva categoria
    </button>

    <div class="cat-list">
      @for (cat of categories(); track cat.id) {
      <div class="cat-row">
        <div class="cat-dot" [style.background-color]="cat.color"></div>

        <div class="cat-info">
          <span class="cat-name">{{ cat.name }}</span>
          <span class="cat-count">{{ getTaskCount(cat.id) }} TASKS</span>
        </div>

        <div class="cat-row-actions">
          <button class="row-action-btn" (click)="openEditCategoryModal(cat)">
            <ion-icon name="create-outline" />
          </button>
          <button
            class="row-action-btn danger-btn"
            (click)="confirmDeleteCategory(cat)"
          >
            <ion-icon name="trash-outline" />
          </button>
        </div>
      </div>
      } @empty {
      <div class="empty-state">
        <ion-icon name="pricetags-outline" class="empty-icon" />
        <h3 class="empty-title">No existen categorias</h3>
        <p class="empty-sub">Crea tu primera categoria</p>
      </div>
      }
    </div>
  </div>
</ion-content>
